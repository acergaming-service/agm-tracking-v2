<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通路填單 — 遊戲片追貨平台</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--surface:#fff;--surface2:#f7f8fa;
  --border:#d8dde6;--text:#1a2030;--text2:#3d4a5c;--text3:#7a8699;
  --accent:#1d6ef5;--accent-dim:#e8f0fe;
  --green:#16a34a;--green-dim:#f0faf4;--green-b:#bbf7d0;
  --red:#dc2626;--red-dim:#fef2f2;--red-b:#fecaca;
  --amber:#d97706;--amber-dim:#fffbeb;--amber-b:#fde68a;
  --purple:#7c3aed;--purple-dim:#f5f3ff;
  --font:'Noto Sans TC',sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:12px;--radius-sm:8px;--shadow:0 2px 8px rgba(0,0,0,0.07);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

/* NAV */
nav{background:#fff;border-bottom:2px solid var(--border);padding:0 1.5rem;height:64px;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.nav-logo{font-weight:900;font-size:1.1rem;display:flex;align-items:center;gap:8px}
.nav-pill{font-size:0.88rem;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 14px;color:var(--text2);font-weight:500}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.badge{font-size:0.82rem;padding:5px 14px;border-radius:20px;font-weight:700}
.badge-green{background:var(--green-dim);color:var(--green);border:2px solid var(--green-b)}
.badge-amber{background:var(--amber-dim);color:var(--amber);border:2px solid var(--amber-b)}
.sync-ring{display:inline-block;width:10px;height:10px;border:2px solid transparent;border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;opacity:0;transition:opacity .2s}
.sync-ring.show{opacity:1}
@keyframes spin{to{transform:rotate(360deg)}}

/* LAYOUT */
.container{max-width:1400px;margin:0 auto;padding:1.5rem 1.5rem 100px}
.page-header{margin-bottom:1.2rem}
.page-header h1{font-size:1.6rem;font-weight:900;margin-bottom:4px}
.page-header p{font-size:0.92rem;color:var(--text2)}

/* WINDOW CLOSED */
.window-closed{background:var(--amber-dim);border:2px solid var(--amber-b);border-radius:var(--radius);padding:1.5rem;text-align:center;margin-bottom:1.2rem}
.window-closed h3{color:var(--amber);font-size:1.1rem;margin-bottom:6px}

/* ── VENDOR TABS（大 Tab）── */
.vendor-tabs{display:flex;gap:8px;margin-bottom:0;border-bottom:2px solid var(--border);padding-bottom:0}
.vendor-tab{padding:10px 24px;font-size:1rem;font-weight:700;cursor:pointer;border:2px solid transparent;border-bottom:none;background:transparent;color:var(--text3);font-family:var(--font);border-radius:10px 10px 0 0;transition:all 0.15s;position:relative;bottom:-2px}
.vendor-tab:hover{color:var(--text);background:var(--surface2)}
.vendor-tab.active{background:#fff;border-color:var(--border);border-bottom-color:#fff;color:var(--accent)}
.vtab-badge{display:inline-block;background:var(--accent-dim);color:var(--accent);border-radius:10px;padding:1px 7px;font-size:0.72rem;margin-left:5px;font-weight:700}
.vendor-tab.active .vtab-badge{background:var(--accent);color:#fff}

/* ── SUB TABS（類型 Tab）── */
.sub-tab-bar{background:#fff;border-left:2px solid var(--border);border-right:2px solid var(--border);padding:12px 16px 0;display:flex;gap:6px;flex-wrap:wrap}
.sub-tab{padding:7px 18px;border-radius:6px;font-size:0.88rem;font-weight:600;cursor:pointer;border:2px solid var(--border);background:var(--surface2);color:var(--text2);font-family:var(--font);transition:all 0.15s;margin-bottom:10px}
.sub-tab:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.sub-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.sub-tab-badge{display:inline-block;background:rgba(255,255,255,0.3);border-radius:10px;padding:1px 6px;font-size:0.72rem;margin-left:4px}
.sub-tab:not(.active) .sub-tab-badge{background:var(--accent-dim);color:var(--accent)}

/* ── PRODUCT TABLE ── */
.prod-wrap{background:#fff;border:2px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden}
.prod-thead{display:grid;grid-template-columns:80px minmax(220px,1fr) 105px 105px 105px 65px 160px 100px;gap:0;padding:0;background:var(--surface2);border-bottom:2px solid var(--border2)}
.prod-thead>*{padding:8px 12px;border-right:1px solid var(--border);text-align:center}
.prod-thead>*:last-child{border-right:none}
.prod-thead span{font-size:0.82rem;font-weight:900;color:var(--text);text-transform:uppercase;letter-spacing:0.04em;text-align:center}
.prod-row{display:grid;grid-template-columns:80px minmax(220px,1fr) 105px 105px 105px 65px 160px 100px;gap:0;align-items:stretch;padding:0;border-bottom:1px solid var(--border);transition:background 0.1s}
.prod-row>*{padding:10px 12px;vertical-align:middle}
.prod-row:last-child{border-bottom:none}
.prod-row:hover{background:var(--surface2)}

/* 平台標籤 */
.platform-tag{font-family:var(--mono);font-size:0.78rem;padding:4px 10px;border-radius:6px;font-weight:700;display:inline-block;text-align:center}
.NS{color:#1d6ef5;background:#e8f0fe;border:1px solid #bfcffe}
.NS2{color:#0d47a1;background:#dce5ff;border:1px solid #9ab0ff}
.PS5{color:#7c3aed;background:#f5f3ff;border:1px solid #ddd6fe}
.PS4{color:#059669;background:#ecfdf5;border:1px solid #a7f3d0}
.VR{color:#dc2626;background:#fef2f2;border:1px solid #fecaca}

/* 分配出貨標籤 */
.alloc-tag{font-size:0.75rem;padding:3px 8px;border-radius:5px;background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-b);font-weight:700;display:inline-block;margin-left:6px}

/* 品名區 */
.prod-name{font-size:0.95rem;font-weight:700;margin-bottom:5px;line-height:1.3}
.prod-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-available{background:var(--green)}.dot-incoming{background:var(--amber)}
.dot-preorder{background:var(--accent)}.dot-delayed{background:var(--red)}.dot-unavailable{background:var(--text3)}
.prod-pn{font-family:var(--mono);font-size:0.75rem;color:var(--text3)}
.prod-status{font-size:0.82rem;color:var(--text2)}

/* 到貨日期（重點顯示）*/
.arrival-tag{display:inline-flex;align-items:center;gap:4px;font-size:0.82rem;font-weight:700;color:#fff;background:var(--amber);padding:3px 10px;border-radius:6px;margin-top:5px}
.arrival-tag svg{flex-shrink:0}

/* 庫存量顯示（SONY 專用）*/
.stock-tag{font-size:0.8rem;font-weight:700;padding:2px 8px;border-radius:5px;display:inline-block}
.stock-ok{background:var(--green-dim);color:var(--green);border:1px solid var(--green-b)}
.stock-low{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-b)}
.stock-none{background:#f3f4f6;color:var(--text3);border:1px solid var(--border)}

/* 價格欄 */


/* 數量控制 */
.qty-ctrl{display:flex;align-items:center;justify-content:flex-end}
.qty-input{width:80px;background:#fff;border:2px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:1.05rem;font-weight:600;text-align:center;padding:8px 6px;outline:none;transition:all 0.15s}
.qty-input:focus{border-color:var(--accent)}
.qty-input.has-value{border-color:var(--green);background:var(--green-dim);color:var(--green)}

/* SUMMARY BAR */
.summary-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;gap:2rem;z-index:200;box-shadow:0 -4px 16px rgba(0,0,0,0.08)}
.sum-item{display:flex;flex-direction:column;gap:3px}
.sum-label{font-size:0.78rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;font-weight:600}
.sum-value{font-size:1.2rem;font-weight:900;font-family:var(--mono)}
.sum-sep{width:1px;height:36px;background:var(--border)}
.btn-submit{margin-left:auto;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);padding:0.8rem 2rem;font-family:var(--font);font-size:1.05rem;font-weight:700;cursor:pointer;transition:opacity 0.15s}
.btn-submit:hover{opacity:0.88}
.btn-submit:disabled{opacity:0.4;cursor:not-allowed}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:#fff;border-radius:var(--radius);padding:2rem;width:100%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal h2{font-size:1.3rem;font-weight:900;margin-bottom:8px}
.modal p{font-size:0.95rem;color:var(--text2);margin-bottom:1.5rem}
.order-summary{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;margin-bottom:1.5rem;max-height:300px;overflow-y:auto}
.order-line{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:0.9rem;gap:10px}
.order-line:last-child{border-bottom:none}
.order-line-name{color:var(--text2);flex:1}
.order-line-qty{font-family:var(--mono);font-weight:700}
.modal-actions{display:flex;gap:10px}
.btn-cancel{flex:1;background:#fff;border:2px solid var(--border);color:var(--text2);border-radius:var(--radius-sm);padding:0.75rem;font-family:var(--font);font-size:0.95rem;font-weight:600;cursor:pointer}
.btn-confirm{flex:2;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);padding:0.75rem;font-family:var(--font);font-size:0.95rem;font-weight:700;cursor:pointer}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;z-index:9999}
.loading-spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}

.search-highlight{background:#fef08a;border-radius:2px;padding:0 2px}
.hidden{display:none!important}
.toast{position:fixed;top:24px;right:24px;padding:12px 20px;border-radius:var(--radius-sm);font-weight:700;font-size:0.95rem;z-index:9999;box-shadow:var(--shadow)}
.toast-green{background:var(--green);color:#fff}
.toast-amber{background:var(--amber);color:#fff}
.toast-red{background:var(--red);color:#fff}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="loading-spinner"></div>
  <p style="font-size:1rem;color:var(--text2);font-weight:500">連線中，請稍候…</p>
</div>

<nav>
  <div class="nav-logo"><span>🎮</span> 遊戲片追貨平台</div>
  <div class="nav-pill" id="nav-dealer">—</div>
  <div class="nav-pill" id="nav-week">—</div>
  <div class="nav-right">
    <span class="sync-ring" id="saving-ring"></span>
    <span class="badge badge-green" id="window-badge">收單中</span>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1 id="page-title">遊戲片訂購登記</h1>
    <p>數量填寫後自動同步雲端，不需另外按儲存</p>
  </div>

  <!-- 搜尋列 -->
  <div style="margin-bottom:1.2rem;display:flex;align-items:center;gap:10px">
    <div style="position:relative;flex:1;max-width:400px">
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:1rem;color:var(--text3)">🔍</span>
      <input id="search-input" type="text" placeholder="搜尋品名或國際條碼…"
        style="width:100%;padding:10px 14px 10px 38px;font-size:0.95rem;font-family:var(--font);
               border:2px solid var(--border);border-radius:var(--radius-sm);background:#fff;
               color:var(--text);outline:none"
        oninput="onSearch(this.value)"
        onfocus="this.style.borderColor='var(--accent)'"
        onblur="this.style.borderColor='var(--border)'">
    </div>
    <button onclick="clearSearch()" id="clear-search-btn"
      style="display:none;padding:8px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);
             background:#fff;color:var(--text2);font-family:var(--font);font-size:0.88rem;font-weight:600;cursor:pointer">
      清除
    </button>
  </div>

  <div id="window-closed-banner" class="window-closed hidden">
    <h3>⏸ 本週收單視窗已關閉</h3>
    <p style="font-size:0.92rem;color:var(--text2)">系統正在進行本週結算，請等待下一個收單週期開放。</p>
  </div>

  <!-- 收單時間提示 -->
  <div id="window-time-banner" class="hidden" style="background:var(--green-dim);border:2px solid var(--green-b);border-radius:var(--radius);padding:1rem 1.5rem;margin-bottom:1.2rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:1.2rem">📅</span>
      <span style="font-weight:700;font-size:0.95rem;color:var(--green)">本週收單時間</span>
    </div>
    <div style="display:flex;gap:1.5rem;flex-wrap:wrap;font-size:0.9rem;color:var(--text2)">
      <span id="dealer-win-week" style="font-weight:600"></span>
      <span id="dealer-win-start"></span>
      <span id="dealer-win-end" style="color:var(--red);font-weight:600"></span>
    </div>
  </div>

  <!-- 大 Tab -->
  <div class="vendor-tabs" id="vendor-tabs"></div>
  <!-- 子 Tab -->
  <div class="sub-tab-bar" id="sub-tabs"></div>
  <!-- 產品列表 -->
  <div id="product-area"></div>
</div>

<div class="summary-bar">
  <div class="sum-item"><span class="sum-label">本次品項</span><span class="sum-value" id="sum-items">0</span></div>
  <div class="sum-sep"></div>
  <div class="sum-item"><span class="sum-label">合計數量</span><span class="sum-value" id="sum-qty">0</span></div>
  <div class="sum-sep"></div>
  <div class="sum-item"><span class="sum-label">同步狀態</span><span class="sum-value" style="font-size:0.85rem;color:var(--text2)" id="sum-sync">—</span></div>
  <button class="btn-submit" id="submit-btn" onclick="showConfirm()">確認送出 ✓</button>
</div>

<div class="modal-overlay hidden" id="confirm-modal">
  <div class="modal">
    <h2>確認送出訂單</h2>
    <p id="modal-info"></p>
    <div class="order-summary" id="modal-summary"></div>
    <div style="margin-bottom:1.2rem">
      <label style="font-size:0.88rem;font-weight:700;color:var(--text2);display:block;margin-bottom:6px">備註（選填）</label>
      <textarea id="order-note" placeholder="例：請分批出貨 / 特殊包裝需求 / 其他說明…"
        style="width:100%;background:#fff;border:2px solid var(--border);border-radius:var(--radius-sm);
               color:var(--text);font-family:var(--font);font-size:0.92rem;padding:10px 12px;
               outline:none;resize:vertical;min-height:80px;line-height:1.6"
        onfocus="this.style.borderColor='var(--accent)'"
        onblur="this.style.borderColor='var(--border)'"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">返回修改</button>
      <button class="btn-confirm" onclick="submitOrder()">確認送出</button>
    </div>
  </div>
</div>
<div class="toast hidden" id="toast"></div>

<script>
const FIREBASE_CONFIG={apiKey:"AIzaSyA-eDT7V7asiQ5ebGca-wBif8P-uW89_iQ",authDomain:"agm-tracking.firebaseapp.com",databaseURL:"https://agm-tracking-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"agm-tracking",storageBucket:"agm-tracking.firebasestorage.app",messagingSenderId:"91450833150",appId:"1:91450833150:web:79e5b01783be48ebff4daf"};

// ── URL code 驗證 ──────────────────────────────────────────────────────────
const RAW_CODE=(new URLSearchParams(location.search).get('code')||'').toUpperCase().trim();

// ── State ─────────────────────────────────────────────────────────────────
let fbDB, DEALER_ID, DEALER_INFO, config={}, localOrders={}, pmData={};
let isWindowOpen=true, saveTimer;
let activeVendor='BNE', activeSubFilter='全部';

// 代理商顯示名稱
const VENDOR_LABEL = { BNE:'BNE（萬代南夢宮）', GS:'GSE（Game Source Entertainment）', SONY:'SONY' };
const VENDOR_SHORT = { BNE:'BNE', GS:'GSE', SONY:'SONY' };

// 狀態設定（status 空白 = 未設定，由 PM 維護）
const STATUS_CFG={
  '':            {label:'',              color:'var(--text3)'},
  'instock':     {label:'🟢 現貨',      color:'#16a34a'},
  'preorder':    {label:'🔵 追加中',    color:'#1d6ef5'},
  'clearance':   {label:'🟡 出清',      color:'#d97706'},
  'unavailable': {label:'🔴 停止供應',  color:'#dc2626'},
};

// ── Init ──────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async()=>{
  if(!RAW_CODE){showInvalidCode('未帶入通路代碼');return;}
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    fbDB=firebase.database();

    const[prodSnap,dealerSnap,winSnap,orderSnap,pmSnap]=await Promise.all([
      fbDB.ref('products').once('value'),
      fbDB.ref('dealers').once('value'),
      fbDB.ref('window').once('value'),
      fbDB.ref('orders').once('value'),  // 暫時先讀，後面再用 DEALER_ID 過濾
      fbDB.ref('pmData').once('value'),
    ]);

    const dealers=dealerSnap.val()||{};
    const products=prodSnap.val()||{};
    const winData=winSnap.val()||{open:true,week:''};
    pmData=pmSnap.val()||{};

    // 驗證 code
    for(const[id,d]of Object.entries(dealers)){
      if(RAW_CODE===(d.code+'2025').toUpperCase()){DEALER_ID=id;DEALER_INFO=d;break;}
    }
    if(!DEALER_ID){showInvalidCode(RAW_CODE);return;}

    config={products};
    const now=new Date();
    const inTime=(!winData.startTime||now>=new Date(winData.startTime))&&
                 (!winData.endTime||now<=new Date(winData.endTime));
    isWindowOpen=winData.open===true&&!!winData.week&&inTime;

    // 讀本通路訂單
    const allOrders=orderSnap.val()||{};
    localOrders=allOrders[DEALER_ID]||{};

    // 即時監聽
    fbDB.ref('window').on('value',snap=>{
      const w=snap.val()||{};
      const now2=new Date();
      const inTime2=(!w.startTime||now2>=new Date(w.startTime))&&
                    (!w.endTime||now2<=new Date(w.endTime));
      isWindowOpen=w.open===true&&!!w.week&&inTime2;
      document.getElementById('nav-week').textContent=w.week||'';
      updateWindowUI();
      updateWindowTimeBanner(w);
    });
    // 監聽當週本通路訂單
    const _week=winData.week||'current';
    fbDB.ref(`orders/${_week}/${DEALER_ID}`).on('value',snap=>{
      localOrders=snap.val()||{};
      updateSummary(); renderVendorTabs(); renderSubTabs(); renderProducts();
    });
    fbDB.ref('pmData').on('value',snap=>{
      pmData=snap.val()||{};
      renderProducts();
    });
    // 監聽 products 變化（PM/Admin 更新 maxOrder、狀態等後即時反映）
    fbDB.ref('products').on('value',snap=>{
      config.products=snap.val()||{};
      renderVendorTabs(); renderSubTabs(); renderProducts();
    });

    document.getElementById('nav-dealer').textContent=DEALER_INFO.name;
    document.getElementById('nav-week').textContent=winData.week||'';
    document.getElementById('page-title').textContent=DEALER_INFO.name+' — 訂購登記';

    updateWindowUI();
    renderVendorTabs();
    renderSubTabs();
    renderProducts();
    updateSummary();
    document.getElementById('loading-screen').classList.add('hidden');

  }catch(err){
    document.getElementById('loading-screen').innerHTML=
      `<div style="text-align:center;color:#dc2626;padding:2rem">
        <div style="font-size:3rem;margin-bottom:1rem">⚠️</div>
        <div style="font-size:1rem;font-weight:600">連線失敗</div>
        <div style="font-size:0.85rem;color:#7a8699;margin-top:8px">${err.message}</div>
      </div>`;
  }
});

// ── 收單時間提示 ─────────────────────────────────────────────────────────
function updateWindowTimeBanner(w){
  const banner=document.getElementById('window-time-banner');
  const fmtDT=v=>{
    if(!v) return '';
    const d=new Date(v);
    return d.toLocaleString('zh-TW',{month:'numeric',day:'numeric',weekday:'short',hour:'2-digit',minute:'2-digit'});
  };
  const hasInfo=w.week||w.startTime||w.endTime;
  if(!hasInfo){banner.classList.add('hidden');return;}

  const weekEl=document.getElementById('dealer-win-week');
  const startEl=document.getElementById('dealer-win-start');
  const endEl=document.getElementById('dealer-win-end');
  if(weekEl) weekEl.textContent=w.week?`週次：${w.week}`:'';
  if(startEl) startEl.textContent=w.startTime?`開始：${fmtDT(w.startTime)}`:'';
  if(endEl)   endEl.textContent=w.endTime?`📌 截止：${fmtDT(w.endTime)}`:'';
}

// ── 子類別選項（依代理商）─────────────────────────────────────────────────
function getSubFilters(vendor){
  const prods=Object.values(config.products?.[vendor]||{});
  if(vendor==='BNE'){
    // BNE 全是軟體，用平台分
    const plats=[...new Set(prods.map(p=>p.platform))].sort();
    return ['全部',...plats];
  } else if(vendor==='GS'){
    // GSE 用類型分
    const cats=[...new Set(prods.map(p=>p.category||'軟體'))].sort();
    return ['全部',...cats];
  } else {
    // SONY 用類型分
    const cats=[...new Set(prods.map(p=>p.category||'軟體'))].sort();
    return ['全部',...cats];
  }
}

function filterProducts(vendor, subFilter){
  const prods=Object.values(config.products?.[vendor]||{});
  if(subFilter==='全部') return prods;
  if(vendor==='BNE'){
    return prods.filter(p=>p.platform===subFilter);
  } else {
    return prods.filter(p=>(p.category||'軟體')===subFilter);
  }
}

// ── 訂單操作 ──────────────────────────────────────────────────────────────
function onQtyInput(pid,rawVal){
  const qty=Math.max(0,parseInt(rawVal)||0);
  console.log('[onQtyInput]', { pid, rawVal, parsedQty: qty, isWindowOpen });
  if(!isWindowOpen){
    showToast('收單視窗已關閉，無法修改訂單','red');
    const inp=document.getElementById('qty-'+pid);
    if(inp) inp.value=localOrders[pid]?.qty||'';
    return;
  }
  if(!isWindowOpen){
    const inp=document.getElementById('qty-'+pid);
    if(inp){inp.value='';showToast('收單視窗已關閉，無法填單','red');}
    return;
  }
  const inp=document.getElementById('qty-'+pid);
  if(inp){inp.value=qty;inp.classList.toggle('has-value',qty>0);}
  if(!localOrders[pid])localOrders[pid]={};
  localOrders[pid].qty=qty;
  updateSummary();
  clearTimeout(saveTimer);
  document.getElementById('saving-ring').classList.add('show');
  saveTimer=setTimeout(()=>saveOne(pid,qty),350);
}

async function saveOne(pid,qty){
  try{
    const week=(document.getElementById('nav-week')?.textContent||'').trim()||'current';
    console.log('[saveOne]', { pid, qty, week, DEALER_ID });
    const ref=fbDB.ref(`orders/${week}/${DEALER_ID}/${pid}`);

    // 價格快照：只在第一次建立時寫入，後續修改 qty 不覆蓋
    const existing=(await ref.once('value')).val();
    const priceSnapshot=(existing?.srpAtOrder!=null)?{}:{
      // 第一次建立才寫入價格快照
      srpAtOrder:(()=>{let p=null;Object.values(config.products||{}).forEach(ps=>{if(ps[pid])p=ps[pid];});return p?.srp||0;})(),
      priceTaxAtOrder:(()=>{let p=null;Object.values(config.products||{}).forEach(ps=>{if(ps[pid])p=ps[pid];});return p?.priceTax||0;})(),
      priceAtOrder:(()=>{let p=null;Object.values(config.products||{}).forEach(ps=>{if(ps[pid])p=ps[pid];});return p?.price||0;})(),
    };

    const payload={qty, updatedAt:new Date().toISOString(), submitted:false, ...priceSnapshot};
    console.log('[saveOne] Firebase update', { path: ref.toString(), payload });
    await ref.update(payload);
    document.getElementById('saving-ring').classList.remove('show');
    document.getElementById('sum-sync').textContent='已同步 '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    console.error('[saveOne] error', e);
    document.getElementById('saving-ring').classList.remove('show');
    showToast('同步失敗，請檢查網路','red');
  }
}

function updateSummary(){
  let items=0,qty=0;
  Object.values(localOrders).forEach(o=>{if(o?.qty>0){items++;qty+=o.qty;}});
  document.getElementById('sum-items').textContent=items;
  document.getElementById('sum-qty').textContent=qty;

}

function closeModal(){document.getElementById('confirm-modal').classList.add('hidden');}

async function submitOrder(){
  const note=document.getElementById('order-note')?.value?.trim()||'';
  closeModal();
  try{
    const ts=new Date().toISOString(),updates={};
    const week=(document.getElementById('nav-week')?.textContent||'').trim()||'current';
    Object.entries(localOrders).forEach(([pid,v])=>{
      if(v?.qty>0){
        updates[`orders/${week}/${DEALER_ID}/${pid}/submitted`]=true;
        updates[`orders/${week}/${DEALER_ID}/${pid}/submittedAt`]=ts;
      }
    });
    // 備註存在通路層級
    if(note) updates[`orders/${week}/${DEALER_ID}/_note`]={text:note,submittedAt:ts};
    await fbDB.ref().update(updates);
    showToast('✓ 訂單已送出！後勤將於結算時匯整','green');
  }catch(e){showToast('送出失敗：'+e.message,'red');}
}

  container.innerHTML=`<div class="prod-wrap">
    <div style="padding:10px 16px 6px;font-size:0.85rem;color:var(--text2)">
      搜尋「<strong>${searchQuery}</strong>」共找到 <strong>${allProds.length}</strong> 筆
    </div>
    <div class="prod-thead">
      <span>代理/平台</span>
      <span style="text-align:left">品名</span>
      <span>SRP<br><small style="font-weight:400;font-size:0.72rem;opacity:0.7">含稅</small></span>
      <span>出貨價<br><small style="font-weight:400;font-size:0.72rem;opacity:0.7">含稅</small></span>
      <span>出貨價<br><small style="font-weight:400;font-size:0.72rem;opacity:0.7">未稅</small></span>
      <span>折扣</span>
      <span>備註</span>
      <span>訂購數量</span>
    </div>
    ${rows}
  </div>`;
}

function showToast(msg,type='green'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast toast-${type}`;t.classList.remove('hidden');
  setTimeout(()=>t.classList.add('hidden'),3500);
}

function showInvalidCode(code){
  document.body.innerHTML=`
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;font-family:'Noto Sans TC',sans-serif;background:#f0f2f5">
    <div style="max-width:400px;text-align:center;background:#fff;border-radius:16px;padding:2.5rem;box-shadow:0 4px 20px rgba(0,0,0,0.1)">
      <div style="font-size:4rem;margin-bottom:1rem">🔒</div>
      <h2 style="margin-bottom:.75rem;font-size:1.4rem;font-weight:900;color:#1a2030">連結無效或已過期</h2>
      <p style="font-size:.95rem;color:#3d4a5c;line-height:1.7">請向您的業務確認最新的通路專屬連結。</p>
      ${code&&code!=='未帶入通路代碼'?`<p style="margin-top:1rem;font-size:.8rem;font-family:monospace;color:#7a8699">code: ${code}</p>`:''}
    </div>
  </div>`;
}
</script>
