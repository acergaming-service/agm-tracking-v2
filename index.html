<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遊戲片追貨平台 v2</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--surface:#fff;--border:#d8dde6;
  --text:#1a2030;--text2:#3d4a5c;--text3:#7a8699;
  --accent:#1d6ef5;--accent-dim:#e8f0fe;
  --green:#16a34a;--green-dim:#dcfce7;
  --font:'Noto Sans TC',sans-serif;
  --radius:12px;--radius-sm:8px;--shadow:0 2px 12px rgba(0,0,0,0.08);
}
body{font-family:var(--font);background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:2.5rem;width:100%;max-width:460px;border:2px solid var(--border)}
.logo{text-align:center;margin-bottom:2rem}
.logo h1{font-size:1.6rem;font-weight:900;color:var(--accent);margin-bottom:6px}
.logo p{font-size:0.9rem;color:var(--text3)}
.version{display:inline-block;background:var(--accent);color:#fff;font-size:0.75rem;font-weight:700;border-radius:20px;padding:2px 10px;margin-left:6px;vertical-align:middle}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem}
.role-btn{background:#fff;border:2px solid var(--border);border-radius:var(--radius-sm);padding:14px 10px;cursor:pointer;font-family:var(--font);font-size:0.88rem;font-weight:700;color:var(--text2);text-align:center;transition:all .15s}
.role-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.role-btn.active{border-color:var(--accent);background:var(--accent);color:#fff}
.role-btn .icon{font-size:1.5rem;display:block;margin-bottom:6px}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:0.85rem;font-weight:700;color:var(--text2);margin-bottom:6px}
.form-group input,.form-group select{width:100%;border:2px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-family:var(--font);font-size:0.95rem;color:var(--text);outline:none;background:#fff;-webkit-appearance:none}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.btn-primary{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:13px;font-family:var(--font);font-size:1rem;font-weight:700;cursor:pointer;margin-top:0.5rem}
.btn-primary:hover{background:#1558d6}
.err{color:#dc2626;font-size:0.88rem;margin-top:8px;font-weight:600}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🎮 遊戲片追貨平台 <span class="version">v2</span></h1>
    <p>AGM Gaming Service — 需求統計 ＋ 補貨追蹤</p>
  </div>

  <div class="role-grid">
    <button class="role-btn" onclick="selectRole('logistics',this)"><span class="icon">📊</span>後勤統計</button>
    <button class="role-btn" onclick="selectRole('pm',this)"><span class="icon">⚙️</span>PM 管理</button>
    <button class="role-btn" onclick="selectRole('sales',this)"><span class="icon">💼</span>業務 AGM</button>
    <button class="role-btn" onclick="selectRole('superadmin',this)"><span class="icon">🔑</span>Super Admin</button>
  </div>

  <div id="form-staff" class="hidden">
    <div class="form-group"><label>存取碼</label><input type="password" id="staff-pwd" placeholder="輸入密碼"></div>
  </div>
  <div id="form-sales" class="hidden">
    <div class="form-group"><label>選擇業務帳號</label>
      <select id="sales-select">
        <option value="">— 請選擇 —</option>
        <option>Edward</option><option>Wythe</option><option>Eric</option>
        <option>Hsinhui</option><option>AKI</option><option>Tom</option>
        <option>Mickey</option><option>Meg</option>
      </select>
    </div>
  </div>

  <div id="err" class="err hidden"></div>
  <button class="btn-primary hidden" id="login-btn" onclick="doLogin()">進入系統 →</button>
</div>

<script src="firebase.js"></script>
<script>
let currentRole = null;

function selectRole(role, el) {
  currentRole = role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('form-staff').classList.add('hidden');
  document.getElementById('form-sales').classList.add('hidden');
  document.getElementById('err').classList.add('hidden');
  if (role === 'sales') document.getElementById('form-sales').classList.remove('hidden');
  else document.getElementById('form-staff').classList.remove('hidden');
  document.getElementById('login-btn').classList.remove('hidden');
}

async function doLogin() {
  document.getElementById('err').classList.add('hidden');
  if (!currentRole) return showErr('請先選擇角色');
  if (currentRole === 'sales') {
    const v = document.getElementById('sales-select').value;
    if (!v) return showErr('請選擇業務帳號');
    sessionStorage.setItem('role', 'sales');
    sessionStorage.setItem('sales', v);
    location.href = 'sales.html'; return;
  }
  const pwd = document.getElementById('staff-pwd').value;
  if (!pwd) return showErr('請輸入密碼');

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = '驗證中…';

  let expected = PASSWORDS[currentRole];
  let _fbFailed = false;
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.database();
    const snap = await Promise.race([
      db.ref(`settings/passwords/${currentRole}`).once('value'),
      new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 5000))
    ]);
    if (snap.val() !== null) expected = snap.val();
  } catch (e) {
    _fbFailed = true;
  }

  const errEl = document.getElementById('err');
  if (_fbFailed) {
    errEl.style.color = '#d97706';
    errEl.textContent = '⚠ Firebase 無法連線，已使用本機 fallback 驗證';
    errEl.classList.remove('hidden');
  }

  if (pwd !== expected) {
    btn.disabled = false;
    btn.textContent = '進入系統 →';
    errEl.style.color = '';
    return showErr('密碼錯誤');
  }
  sessionStorage.setItem('role', currentRole);
  const pages = { logistics:'logistics.html', pm:'pm.html', superadmin:'superadmin.html' };
  location.href = pages[currentRole];
}

function showErr(msg) { const e=document.getElementById('err'); e.textContent=msg; e.classList.remove('hidden'); }
document.addEventListener('keydown', e => { if(e.key==='Enter' && currentRole) doLogin(); });
</script>
</body>
</html>
